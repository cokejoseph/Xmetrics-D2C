name: CI

# Quality gate for every push and PR to main. This exists because the real
# type-check is `tsc -b` (run by `npm run build`), NOT `tsc --noEmit` — the
# root tsconfig is solution-style and `--noEmit` silently checks nothing. A
# broken build previously shipped to production unnoticed; this gate prevents
# that class of regression.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check + production build (tsc -b && vite build)
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Lint (warnings allowed, errors fail)
        run: npx eslint . --max-warnings=9999
